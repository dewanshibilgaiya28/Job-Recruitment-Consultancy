{% extends 'main/base.html' %}
{% load static %}

{% block title %}Edit Job - {{ job.title }}{% endblock %}

{% block content %}
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Edit Job Posting</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}

                        <h5 class="mb-3 text-primary">Basic Information</h5>
                        
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="title" class="form-label">Job Title</label>
                                <input type="text" class="form-control" id="title" name="title" value="{{ job.title }}" required>
                            </div>
                            <div class="col-md-6">
                                <label for="job_type" class="form-label">Job Type</label>
                                <select class="form-select" id="job_type" name="job_type" required>
                                    <option value="Full-time" {% if job.job_type == 'Full-time' %}selected{% endif %}>Full Time</option>
                                    <option value="Part-time" {% if job.job_type == 'Part-time' %}selected{% endif %}>Part Time</option>
                                    <option value="Contract" {% if job.job_type == 'Contract' %}selected{% endif %}>Contract</option>
                                    <option value="Temporary" {% if job.job_type == 'Temporary' %}selected{% endif %}>Temporary</option>
                                </select>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="location" class="form-label">Location</label>
                                <input type="text" class="form-control" id="location" name="location" value="{{ job.location }}" required>
                            </div>
                            <div class="col-md-6">
                                <label for="salary" class="form-label">Salary Range</label>
                                <input type="text" class="form-control" id="salary" name="salary" value="{{ job.salary }}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label">Job Description</label>
                            <textarea class="form-control" id="description" name="description" rows="6" required>{{ job.description }}</textarea>
                        </div>

                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="is_active" name="is_active" {% if job.is_active %}checked{% endif %}>
                                <label class="form-check-label" for="is_active">
                                    Job is Active
                                </label>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                            <a href="{% url 'job_detail' job.id %}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
